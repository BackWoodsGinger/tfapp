{% extends "base.html" %}
{% block content %}
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  .btn-xl {
    padding: 1.5rem 1rem;
    font-size: 2rem;
  }
  .timeclock-actions {
    display: grid;
    gap: 0.75rem;
    grid-template-columns: 1fr 1fr;
  }
  @media (min-width: 768px) {
    .timeclock-actions {
      grid-template-columns: repeat(4, 1fr);
    }
  }
  .timeclock-actions .btn {
    min-width: 0;
    min-height: 4.25rem;
    width: 100%;
  }
</style>

<div class="container-fluid h-100 bg-light">
  <div class="row h-100 align-items-center justify-content-center">
    <div class="col-12">
      <div class="card border-0 rounded-0 h-100">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">

          <h1 id="clock" class="display-1 fw-bold text-center mt-5 mb-5"></h1>

          {% if messages %}
          <div aria-live="polite" role="alert" class="mb-4 w-100 text-center">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} fs-4 w-100">
              {{ message }}
            </div>
            {% endfor %}
          </div>
          {% endif %}

          <form method="post" class="w-100" style="max-width: 800px;">
            {% csrf_token %}
            <div class="row justify-content-center mb-4">
              <div class="col-md-3 col-6">
                <input type="password" id="login" name="login" maxlength="4" placeholder="Login"
                  class="form-control form-control-lg text-center" required
                  inputmode="numeric" pattern="\d*" autocomplete="off">
              </div>
              <div class="col-md-3 col-6">
                <input type="password" id="pin" name="pin" maxlength="4" placeholder="PIN"
                  class="form-control form-control-lg text-center" required
                  inputmode="numeric" pattern="\d*" autocomplete="off">
              </div>
            </div>

            <div class="row justify-content-center mt-3">
              <div class="col-12 col-md-6 col-lg-4">
                <div class="row">

                  {% for num in "123456789" %}
                  <div class="col-4 p-2">
                    <button type="button" class="btn btn-secondary btn-xl w-100" onclick="pressKey('{{ num }}')">{{ num }}</button>
                  </div>
                  {% endfor %}

                  <div class="col-4 p-2">
                    <button type="button" class="btn btn-danger btn-xl w-100" onclick="clearField()">C</button>
                  </div>
                  <div class="col-4 p-2">
                    <button type="button" class="btn btn-secondary btn-xl w-100" onclick="pressKey('0')">0</button>
                  </div>
                  <div class="col-4 p-2">
                    <button type="button" class="btn btn-warning btn-xl w-100" onclick="backspace()">←</button>
                  </div>

                </div>
              </div>
            </div>

            <div class="timeclock-actions mt-5">
              <button name="action" value="clock_in" class="btn btn-success btn-xl">Clock In</button>
              <button name="action" value="lunch_out" class="btn btn-warning btn-xl">Lunch Out</button>
              <button name="action" value="lunch_in" class="btn btn-info btn-xl">Lunch In</button>
              <button name="action" value="clock_out" class="btn btn-danger btn-xl">Clock Out</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
  }
  setInterval(updateClock, 1000);
  updateClock();
</script>

<script>
  let activeField = 'login';
  const loginInput = document.getElementById('login');
  const pinInput = document.getElementById('pin');

  // Prevent typing on physical keyboard
  loginInput.addEventListener('keypress', e => e.preventDefault());
  pinInput.addEventListener('keypress', e => e.preventDefault());

  loginInput.addEventListener('focus', () => activeField = 'login');
  pinInput.addEventListener('focus', () => activeField = 'pin');

  function pressKey(num) {
    const field = document.getElementById(activeField);
    if (field.value.length < 4) {
      field.value += num;
    }

    if (field.value.length === 4 && activeField === 'login') {
      activeField = 'pin';
      pinInput.focus();
    }
  }

  function backspace() {
    const field = document.getElementById(activeField);
    field.value = field.value.slice(0, -1);
  }

  function clearField() {
    const field = document.getElementById(activeField);
    field.value = '';
  }
</script>
{% endblock %}
