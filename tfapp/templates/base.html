{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon: JPEG is fine for browser tabs. For ICO/PNG/apple-touch from a converter zip, put files under static/img/favicon/, edit paths in site.webmanifest if needed, then swap this one link for the pack’s link tags. -->
    <link rel="icon" href="{% static 'img/redman.jpg' %}" type="image/jpeg" sizes="any">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}" />
    <!-- Line Icons -->
    <link rel="stylesheet" href="{% static 'css/fontawesome.css' %}"/>
    <!-- Custom -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}"/>
    <title>TF-R App {% block title %}{% endblock %}</title>
</head>
<body class="d-flex flex-column min-vh-100">
{% block site_navbar %}
{% include 'partials/_navbar.html' %}
{% endblock %}

<main class="flex-fill">
    <!-- Main Content -->
    {% block content %} {% endblock %}
</main>

<!-- Footer -->
{% include 'partials/_footer.html' %}



<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<!-- <script src="{% static 'js/script.js' %}"></script> -->



</body>
</html>
