{% extends "base.html" %}

{% block title %} | Password updated {% endblock %}

{% block content %}
<section class="bg-dark py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-check"></i> Password updated</h4>
                    </div>
                    <div class="card-body">
                        <p class="mb-0">Your password has been set. You can now sign in with your new password.</p>
                        <p class="mt-3 mb-0">
                            <a href="{% url 'login' %}" class="btn btn-primary">Log in</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
